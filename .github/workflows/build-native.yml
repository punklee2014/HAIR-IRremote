name: Build Native (irhvac)

on:
  push:
    branches: [main]
    paths:
      - "vendor/IRremoteESP8266/**"
      - "build/**"
      - ".github/workflows/build-native.yml"
  pull_request:
    branches: [main]
    paths:
      - "vendor/IRremoteESP8266/**"
      - "build/**"
      - ".github/workflows/build-native.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build _irhvac.so (${{ matrix.arch }} py${{ matrix.python }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python: ["3.12", "3.13", "3.14"]
        include:
          - arch: linux_x86_64
            platform: linux/amd64
            script_arch: x86_64
          - arch: linux_aarch64
            platform: linux/arm64
            script_arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set py suffix
        id: py_suffix
        run: echo "value=py$(echo '${{ matrix.python }}' | tr -d '.')" >> $GITHUB_OUTPUT

      - name: Build irhvac builder image (${{ matrix.platform }}, py${{ matrix.python }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg PYTHON_VERSION=${{ matrix.python }} \
            -f build/docker/Dockerfile.irhvac \
            -t irhvac-builder:${{ matrix.arch }}-py${{ matrix.python }} \
            --load \
            .

      - name: Build _irhvac.so
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -e PYTHON_VERSION=${{ matrix.python }} \
            -v ${{ github.workspace }}:/workspace \
            irhvac-builder:${{ matrix.arch }}-py${{ matrix.python }} \
            bash ./build/build_irhvac.sh ${{ matrix.script_arch }}

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.arch }}-py${{ matrix.python }}
          path: |
            custom_components/hair/native/${{ matrix.arch }}/${{ steps.py_suffix.outputs.value }}/_irhvac.so

  build-musl:
    name: Build _irhvac.so musl (${{ matrix.arch }} ${{ matrix.alpine }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: linux_x86_64_musl
            platform: linux/amd64
            script_arch: x86_64
            out_dir: custom_components/hair/native/linux_x86_64_musl
            alpine: alpine:3.21
            python: "3.12"
          - arch: linux_x86_64_musl
            platform: linux/amd64
            script_arch: x86_64
            out_dir: custom_components/hair/native/linux_x86_64_musl
            alpine: alpine:3.22
            python: "3.13"
          - arch: linux_x86_64_musl
            platform: linux/amd64
            script_arch: x86_64
            out_dir: custom_components/hair/native/linux_x86_64_musl
            alpine: alpine:edge
            python: "3.14"
          - arch: linux_aarch64_musl
            platform: linux/arm64
            script_arch: aarch64
            out_dir: custom_components/hair/native/linux_aarch64_musl
            alpine: alpine:3.21
            python: "3.12"
          - arch: linux_aarch64_musl
            platform: linux/arm64
            script_arch: aarch64
            out_dir: custom_components/hair/native/linux_aarch64_musl
            alpine: alpine:3.22
            python: "3.13"
          - arch: linux_aarch64_musl
            platform: linux/arm64
            script_arch: aarch64
            out_dir: custom_components/hair/native/linux_aarch64_musl
            alpine: alpine:edge
            python: "3.14"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set py suffix
        id: py_suffix
        run: echo "value=py$(echo '${{ matrix.python }}' | tr -d '.')" >> $GITHUB_OUTPUT

      - name: Build irhvac musl builder image (${{ matrix.platform }}, ${{ matrix.alpine }})
        env:
          ALPINE: ${{ matrix.alpine }}
        run: |
          ALPINE_TAG="${ALPINE//:/-}"
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg ALPINE_BASE=${{ matrix.alpine }} \
            -f build/docker/Dockerfile.irhvac.musl \
            -t "irhvac-builder-musl:${{ matrix.arch }}-${ALPINE_TAG}" \
            --load \
            .

      - name: Build _irhvac.so (musl)
        env:
          ALPINE: ${{ matrix.alpine }}
        run: |
          ALPINE_TAG="${ALPINE//:/-}"
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -e PYTHON_VERSION=${{ matrix.python }} \
            -v ${{ github.workspace }}:/workspace \
            "irhvac-builder-musl:${{ matrix.arch }}-${ALPINE_TAG}" \
            bash ./build/build_irhvac.sh ${{ matrix.script_arch }} ${{ matrix.out_dir }}

      - name: Upload musl native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.arch }}-py${{ matrix.python }}
          path: |
            custom_components/hair/native/${{ matrix.arch }}/${{ steps.py_suffix.outputs.value }}/_irhvac.so