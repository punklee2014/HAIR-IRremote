name: Build Native (irhvac)

on:
  push:
    branches: [main]
    paths:
      - "vendor/IRremoteESP8266/**"
      - "build/**"
      - ".github/workflows/build-native.yml"
  pull_request:
    branches: [main]
    paths:
      - "vendor/IRremoteESP8266/**"
      - "build/**"
      - ".github/workflows/build-native.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build _irhvac.so (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: linux_x86_64
            platform: linux/amd64
            script_arch: x86_64
          - arch: linux_aarch64
            platform: linux/arm64
            script_arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build irhvac builder image (${{ matrix.platform }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f build/docker/Dockerfile.irhvac \
            -t irhvac-builder:${{ matrix.arch }} \
            --load \
            .

      - name: Build _irhvac.so
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            irhvac-builder:${{ matrix.arch }} \
            ./build/build_irhvac.sh ${{ matrix.script_arch }}

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.arch }}
          path: |
            custom_components/hair/native/${{ matrix.arch }}/_irhvac.so
            custom_components/hair/native/${{ matrix.arch }}/irhvac.py
