name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-native:
    name: Build native (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: linux_x86_64
            platform: linux/amd64
            script_arch: x86_64
          - arch: linux_aarch64
            platform: linux/arm64
            script_arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build irhvac builder image (${{ matrix.platform }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f build/docker/Dockerfile.irhvac \
            -t irhvac-builder:${{ matrix.arch }} \
            --load \
            .

      - name: Build _irhvac.so
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            irhvac-builder:${{ matrix.arch }} \
            ./build/build_irhvac.sh ${{ matrix.script_arch }}

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.arch }}
          path: |
            custom_components/hair/native/${{ matrix.arch }}/_irhvac.so
            custom_components/hair/native/${{ matrix.arch }}/irhvac.py

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-artifacts

      - name: Merge native into custom_components
        run: |
          for arch_dir in native-artifacts/native-*; do
            arch_name=$(basename "$arch_dir" | sed 's/^native-//')
            mkdir -p "custom_components/hair/native/$arch_name"
            cp "$arch_dir"/* "custom_components/hair/native/$arch_name/"
          done
          ls -R custom_components/hair/native/

      - name: Create release zip
        run: |
          mkdir -p release/hair
          cp -r custom_components/hair/* release/hair/
          (cd release && zip -r ../hair_irremote.zip hair/)

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: hair_irremote.zip
          generate_release_notes: true
