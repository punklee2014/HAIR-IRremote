name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Required for softprops/action-gh-release to create releases.
permissions:
  contents: write

jobs:
  build-native:
    name: Build native (${{ matrix.arch }} py${{ matrix.python }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python: ["3.12", "3.13", "3.14"]
        include:
          - arch: linux_x86_64
            platform: linux/amd64
            script_arch: x86_64
          - arch: linux_aarch64
            platform: linux/arm64
            script_arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build irhvac builder image (${{ matrix.platform }}, py${{ matrix.python }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg PYTHON_VERSION=${{ matrix.python }} \
            -f build/docker/Dockerfile.irhvac \
            -t irhvac-builder:${{ matrix.arch }}-py${{ matrix.python }} \
            --load \
            .

      - name: Build _irhvac.so
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -e PYTHON_VERSION=${{ matrix.python }} \
            -v ${{ github.workspace }}:/workspace \
            irhvac-builder:${{ matrix.arch }}-py${{ matrix.python }} \
            bash ./build/build_irhvac.sh ${{ matrix.script_arch }}

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.arch }}-py${{ matrix.python }}
          path: |
            custom_components/hair/native/${{ matrix.arch }}/py${{ matrix.python | replace('.', '') }}/_irhvac.so
            custom_components/hair/native/${{ matrix.arch }}/py${{ matrix.python | replace('.', '') }}/irhvac.py

  build-native-musl:
    name: Build native musl (${{ matrix.arch }} ${{ matrix.alpine }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: linux_x86_64_musl
            platform: linux/amd64
            script_arch: x86_64
            out_dir: custom_components/hair/native/linux_x86_64_musl
            alpine: alpine:3.21
            python: "3.12"
          - arch: linux_x86_64_musl
            platform: linux/amd64
            script_arch: x86_64
            out_dir: custom_components/hair/native/linux_x86_64_musl
            alpine: alpine:3.22
            python: "3.13"
          - arch: linux_x86_64_musl
            platform: linux/amd64
            script_arch: x86_64
            out_dir: custom_components/hair/native/linux_x86_64_musl
            alpine: alpine:edge
            python: "3.14"
          - arch: linux_aarch64_musl
            platform: linux/arm64
            script_arch: aarch64
            out_dir: custom_components/hair/native/linux_aarch64_musl
            alpine: alpine:3.21
            python: "3.12"
          - arch: linux_aarch64_musl
            platform: linux/arm64
            script_arch: aarch64
            out_dir: custom_components/hair/native/linux_aarch64_musl
            alpine: alpine:3.22
            python: "3.13"
          - arch: linux_aarch64_musl
            platform: linux/arm64
            script_arch: aarch64
            out_dir: custom_components/hair/native/linux_aarch64_musl
            alpine: alpine:edge
            python: "3.14"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build irhvac musl builder image (${{ matrix.platform }}, ${{ matrix.alpine }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg ALPINE_BASE=${{ matrix.alpine }} \
            -f build/docker/Dockerfile.irhvac.musl \
            -t irhvac-builder-musl:${{ matrix.arch }}-${{ matrix.alpine }} \
            --load \
            .

      - name: Build _irhvac.so (musl)
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -e PYTHON_VERSION=${{ matrix.python }} \
            -v ${{ github.workspace }}:/workspace \
            irhvac-builder-musl:${{ matrix.arch }}-${{ matrix.alpine }} \
            bash ./build/build_irhvac.sh ${{ matrix.script_arch }} ${{ matrix.out_dir }}

      - name: Upload musl native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.arch }}-py${{ matrix.python }}
          path: |
            custom_components/hair/native/${{ matrix.arch }}/py${{ matrix.python | replace('.', '') }}/_irhvac.so
            custom_components/hair/native/${{ matrix.arch }}/py${{ matrix.python | replace('.', '') }}/irhvac.py

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-native, build-native-musl]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-artifacts

      - name: Merge native into custom_components
        run: |
          for artifact_dir in native-artifacts/native-*; do
            # artifact names: native-linux_x86_64-py314, native-linux_aarch64_musl-py312, etc.
            base=$(basename "$artifact_dir")
            # Extract arch and py suffix
            arch_part="${base#native-}"
            # arch_part is like "linux_x86_64-py314"
            if [[ "$arch_part" == *-py* ]]; then
              arch="${arch_part%-py*}"      # linux_x86_64
              py_suffix="${arch_part##*-}"   # py314
            else
              arch="$arch_part"
              py_suffix="py314"
            fi
            dest="custom_components/hair/native/${arch}/${py_suffix}"
            mkdir -p "$dest"
            cp "$artifact_dir"/* "$dest/"
          done
          echo "=== Native tree ==="
          find custom_components/hair/native -type f | sort

      - name: Create release zip
        run: |
          (cd custom_components/hair && zip -r ../../hair_irremote.zip .)

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: hair_irremote.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          token: ${{ secrets.GITHUB_TOKEN }}